<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRESCITA — The Growth Collection</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#fff;color:#000;line-height:1.5;-webkit-font-smoothing:antialiased}
header{position:sticky;top:0;z-index:100;background:#fff;text-align:center;padding:18px 20px;border-bottom:1px solid #eee;font-weight:700;letter-spacing:.45em;font-size:16px}
.hero{height:100vh;min-height:560px;position:relative;display:flex;align-items:center;justify-content:center;text-align:center;color:#fff;overflow:hidden;background:#000 url('assets/blue.png') center/cover no-repeat}
.hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.hero::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:1}
.hero-content{position:relative;z-index:2;padding:20px}
.eyebrow{font-size:12px;letter-spacing:.25em;opacity:.85;margin-bottom:16px;text-transform:uppercase}
h1{font-size:clamp(34px,7vw,64px);font-weight:800;letter-spacing:.01em;line-height:1.05}
.btn{display:inline-block;margin-top:32px;padding:14px 34px;border:1.5px solid #fff;color:#fff;text-decoration:none;font-size:13px;letter-spacing:.18em;font-weight:600}
.btn:hover{background:#fff;color:#000}
section{padding:80px 20px;max-width:1100px;margin:0 auto}
h2{text-align:center;font-size:13px;letter-spacing:.35em;font-weight:700;margin-bottom:40px;text-transform:uppercase}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:28px}
.card img{width:100%;height:auto;display:block;background:#f5f5f5;aspect-ratio:4/5;object-fit:cover}
.card-label{text-align:center;margin-top:14px;font-size:14px;letter-spacing:.02em}
.message{max-width:720px;margin:0 auto;text-align:center;padding:100px 20px;font-size:clamp(18px,2.5vw,22px);line-height:1.7}
.message span{display:block;margin-top:18px;font-size:14px;letter-spacing:.2em;opacity:.7}
footer{border-top:1px solid #eee;text-align:center;padding:36px 20px;font-size:14px;color:#666}
footer a{color:#000;text-decoration:none;margin-left:14px}
@media(max-width:700px){.grid{grid-template-columns:1fr;gap:40px}section{padding:60px 20px}.hero{min-height:520px}.message{padding:70px 20px}}
</style>
</head>
<body>
<header>CRESCITA</header>

<section class="hero">
  <video autoplay muted loop playsinline poster="assets/blue.png">
    <source src="hero.mp4" type="video/mp4">
  </video>
  <div class="hero-content">
    <div class="eyebrow">AVAILABLE NOW</div>
    <h1>THE GROWTH<br>COLLECTION</h1>
    <a href="#shop" class="btn">SHOP NOW</a>
  </div>
</section>

<section id="shop">
  <h2>JUST ARRIVED</h2>
  <div class="grid">
    <div class="card">
      <img src="assets/blue.png" alt="Blue Tracksuit">
      <div class="card-label">BLUE TRACKSUIT - R5 000</div>
    </div>
    <div class="card">
      <img src="assets/blk.png" alt="Black Tracksuit">
      <div class="card-label">BLACK TRACKSUIT - R5 000</div>
    </div>
  </div>
</section>

<section class="message">
  <p>Crescita is more than a clothing brand. Growth in faith. Growth in character. Growth in ambition.</p>
  <span>Faith on Every Thread. Growth in Every Step.</span>
</section>

<footer>
  <span>crescitaofficial.com</span>
  <a href="https://instagram.com" target="_blank" rel="noopener">Instagram</a>
</footer>
</body>
</html>
